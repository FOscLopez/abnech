<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Club</title>

<link rel="stylesheet" href="./css/style.css">

<style>

.club-header{
  min-height:40vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  gap:12px;
}

.club-header img{
  height:120px;
}

.club-content{
  max-width:900px;
  margin:auto;
  padding:2rem;
}

.section{
  background:#0b0f1f;
  padding:1.5rem;
  border-radius:14px;
  margin-bottom:1.5rem;
}

</style>

</head>

<body>

<div id="clubHeader" class="club-header"></div>

<div class="club-content">

  <div class="section">
    <h2>📰 Noticias</h2>
    <p>Próximamente...</p>
  </div>

  <div class="section">
    <h2>👥 Plantel</h2>
    <p>Próximamente...</p>
  </div>

  <div class="section">
    <h2>📜 Historia</h2>
    <p>Próximamente...</p>
  </div>

</div>

<script>

const CLUBS = {

  union:{
    name:"Unión",
    color:"#000000",
    logo:"./img/clubs/union.png"
  },

  funebrero:{
    name:"Funebrero",
    color:"#b91c1c",
    logo:"./img/clubs/funebrero.png"
  },

  cfa:{
    name:"CFA",
    color:"#1d4ed8",
    logo:"./img/clubs/cfa.png"
  },

  "general-vedia":{
    name:"General Vedia",
    color:"#f59e0b",
    logo:"./img/clubs/general-vedia.png"
  },

  "la-leonesa":{
    name:"La Leonesa",
    color:"#16a34a",
    logo:"./img/clubs/la-leonesa.png"
  },

  "palermo-cap":{
    name:"Palermo CAP",
    color:"#ea580c",
    logo:"./img/clubs/palermo-cap.png"
  },

  "puerto-bermejo":{
    name:"Puerto Bermejo",
    color:"#0ea5e9",
    logo:"./img/clubs/puerto-bermejo.png"
  },

  zapallar:{
    name:"Zapallar",
    color:"#9333ea",
    logo:"./img/clubs/zapallar.png"
  },

};

const params = new URLSearchParams(location.search);

const id = params.get("id");

const club = CLUBS[id];

if(!club){
  document.body.innerHTML="Club no encontrado";
}else{

  document.title = club.name;

  const header = document.getElementById("clubHeader");

  header.style.background = `
    linear-gradient(to bottom, rgba(0,0,0,.7), rgba(0,0,0,.9)),
    ${club.color}
  `;

  header.innerHTML = `
    <img src="${club.logo}">
    <h1>${club.name}</h1>
  `;
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Club</title>

  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/club.css">

</head>

<body>

  <!-- HEADER CLUB -->

  <section id="club-header" class="club-header">

    <img id="club-logo" src="" alt="Logo">

    <h1 id="club-name"></h1>

    <p id="club-colors"></p>

  </section>


  <!-- MENU -->

  <nav class="club-nav">

    <button data-tab="news" class="active">Noticias</button>
    <button data-tab="squad">Plantel</button>
    <button data-tab="history">Historia</button>

  </nav>


  <!-- CONTENIDO -->

  <main class="club-content">

    <!-- NOTICIAS -->
    <section id="news" class="tab active"></section>

    <!-- PLANTEL -->
    <section id="squad" class="tab"></section>

    <!-- HISTORIA -->
    <section id="history" class="tab"></section>

  </main>


  <script type="module" src="./js/club.js"></script>

</body>

</html>

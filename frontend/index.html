<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABNECH Basket</title>

  <link rel="stylesheet" href="./css/style.css" />

  <style>
    /* ===== LANDING ===== */
    .landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 1.5rem;
      text-align: center;
      transition: opacity 0.6s ease;
    }

    .landing.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .enter-btn {
      padding: 1rem 2.8rem;
      font-size: 1.2rem;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: #ff6b00;
      color: #fff;
      font-weight: bold;
    }

    /* ===== APP ===== */
    #app {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    #app.show {
      opacity: 1;
      transform: translateY(0);
    }

    .hidden {
      display: none;
    }

    /* ===== FIXTURE ===== */
    .fixture-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1rem;
      margin-top: 1rem;
    }

    .fixture-card {
      background: linear-gradient(145deg, #0f172a, #020617);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
      border: 1px solid #1e293b;
    }

    .fixture-teams {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: bold;
      margin: 1rem 0;
    }

    .fixture-vs {
      color: #ff6b00;
    }

    .fixture-info {
      font-size: 0.85rem;
      color: #94a3b8;
    }
  </style>
</head>

<body>

  <!-- LANDING -->
  <section id="landing" class="landing">
    <h1>ABNECH Basket</h1>
    <p>Liga Regional de Básquet</p>
    <button class="enter-btn" id="enterBtn">Entrar</button>
  </section>

  <!-- APP -->
  <div id="app" class="hidden">

    <header class="site-header">
      <span class="logo-main">ABNECH Basket</span>
    </header>

    <main>

      <section id="fixture" class="section-block">
        <h2>FIXTURE</h2>
        <div id="fixture-grid" class="fixture-grid"></div>
      </section>

      <section id="tabla" class="section-block">
        <h2>TABLA DE POSICIONES</h2>
        <div class="standings-table-wrapper">
          <table class="standings-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Club</th>
                <th>PJ</th>
                <th>PG</th>
                <th>PP</th>
                <th>PF</th>
                <th>PC</th>
                <th>DG</th>
                <th>PTS</th>
              </tr>
            </thead>
            <tbody id="standingsBody"></tbody>
          </table>
        </div>
      </section>

    </main>

    <footer class="site-footer">
      <p>© 2025 ABNECH Basket (MecInfoTec)</p>
    </footer>
  </div>

  <!-- SCRIPT -->
  <script type="module">
    import { initPublicPage } from "./js/public.js";

    const landing = document.getElementById("landing");
    const app = document.getElementById("app");
    const enterBtn = document.getElementById("enterBtn");

    const entered = localStorage.getItem("abnech_entered");

    if (entered === "true") {
      landing.classList.add("hidden");
      app.classList.remove("hidden");
      app.classList.add("show");
      initPublicPage();
    }

    enterBtn.addEventListener("click", () => {
      localStorage.setItem("abnech_entered", "true");
      landing.classList.add("fade-out");

      setTimeout(() => {
        landing.classList.add("hidden");
        app.classList.remove("hidden");
        app.classList.add("show");
        initPublicPage();
      }, 600);
    });
  </script>

</body>
</html>

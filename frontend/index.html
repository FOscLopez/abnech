<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ABNECH Basket</title>

  <link rel="stylesheet" href="./css/style.css">

  <!-- FUENTES PRO -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- HERO -->
<section class="hero">

  <!-- SLIDER -->
  <div class="hero-slider">
    <div class="slide active"><img src="./img/slide1.jpg"></div>
    <div class="slide"><img src="./img/slide2.jpg"></div>
    <div class="slide"><img src="./img/slide3.jpg"></div>
  </div>

  <!-- PARTÍCULAS -->
  <canvas id="particles"></canvas>

  <div class="hero-content">
    <img src="./img/logo-abnech.png" class="logo-abnech">
    
    <span class="badge">TEMPORADA 2026</span>

    <h1>ABNECH <span>BASKET</span></h1>

    <p>Liga Regional del Nordeste Chaqueño</p>

    <a href="#fixture" class="primary-btn">Ver Fixture</a>

    <!-- BANNER -->
    <div class="clubs-banner">
      <div class="clubs-track" id="clubs-track"></div>
    </div>

  </div>
</section>

<section class="clubs">

  <h2><span>CLUBES</span> PARTICIPANTES</h2>

  <div id="clubs-container" class="club-grid"></div>

</section>

<!-- PROXIMA FECHA -->
<section class="next-match">

  <h2>PRÓXIMA FECHA</h2>

  <div class="match-highlight">

    <div class="team">
      <img src="./img/clubs/funebrero.png">
      <p>Funebrero</p>
    </div>

    <div class="vs">VS</div>

    <div class="team">
      <img src="./img/clubs/union.png">
      <p>Unión</p>
    </div>

  </div>

  <div class="match-info">
    25 Marzo - 21:30 hs
  </div>

</section>

<!-- FIXTURE -->
<section id="fixture" class="fixture">

  <h2><span>FIXTURE</span></h2>

  <div class="match-card">
    <span class="date">2025-06-21</span>
    <div class="teams">
      <span>Funebrero</span>
      <strong>89 - 70</strong>
      <span>Unión</span>
    </div>
  </div>

  <div class="match-card">
    <span class="date">2026-01-13</span>
    <div class="teams">
      <span>Palermo CAP</span>
      <strong>65 - 60</strong>
      <span>Puerto Bermejo</span>
    </div>
  </div>

</section>

<!-- SCRIPT -->
<script src="./js/clubs.js"></script>
<script src="./js/main.js"></script>

</body>
</html>

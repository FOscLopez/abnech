<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABNECH Basket</title>

  <link rel="stylesheet" href="./css/style.css">
</head>

<body>

<header class="main-header">
  <div class="container header-content">
    <h1 class="logo">ABNECH Basket</h1>
  </div>
</header>

<!-- ================= HERO ================= -->

<section class="hero">

  <div class="hero-content">
    <h1>Liga Regional de Básquet</h1>
    <p>Resultados, estadísticas y toda la acción</p>

    <button id="enterBtn" class="primary-btn">
      Ver Fixture
    </button>

    <!-- ===== BANNER CLUBES ===== -->
    <div class="clubs-banner">

      <div class="clubs-track">

        <!-- ORIGINAL -->
        <a href="club.html?id=funebrero" class="club-item">
          <img src="./img/clubs/funebrero.png">
          <span>Funebrero</span>
        </a>

        <a href="club.html?id=union" class="club-item">
          <img src="./img/clubs/union.png">
          <span>Unión</span>
        </a>

        <a href="club.html?id=cfa" class="club-item">
          <img src="./img/clubs/cfa.png">
          <span>CFA</span>
        </a>

        <a href="club.html?id=zapallar" class="club-item">
          <img src="./img/clubs/zapallar.png">
          <span>Zapallar</span>
        </a>

        <!-- DUPLICADO (CLAVE) -->
        <a href="club.html?id=funebrero" class="club-item">
          <img src="./img/clubs/funebrero.png">
          <span>Funebrero</span>
        </a>

        <a href="club.html?id=union" class="club-item">
          <img src="./img/clubs/union.png">
          <span>Unión</span>
        </a>

        <a href="club.html?id=cfa" class="club-item">
          <img src="./img/clubs/cfa.png">
          <span>CFA</span>
        </a>

        <a href="club.html?id=zapallar" class="club-item">
          <img src="./img/clubs/zapallar.png">
          <span>Zapallar</span>
        </a>

      </div>

    </div>

  </div>

</section>

<!-- ================= APP ================= -->

<div id="app" style="display:none">

  <main class="container">

    <section class="section-block">
      <h2>Fixture</h2>
      <div id="fixture-grid"></div>
    </section>

    <section class="section-block">
      <h2>Tabla</h2>

      <div class="standings-table-wrapper">
        <table class="standings-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Club</th>
              <th>PJ</th>
              <th>PG</th>
              <th>PP</th>
              <th>PF</th>
              <th>PC</th>
              <th>DG</th>
              <th>PTS</th>
            </tr>
          </thead>
          <tbody id="standingsBody"></tbody>
        </table>
      </div>

    </section>

  </main>

</div>

<footer class="site-footer">
© 2026 ABNECH Basket
</footer>

<script type="module">
import { initPublicPage } from "./js/public.js";

const btn = document.getElementById("enterBtn");
const app = document.getElementById("app");

btn.onclick = () => {
  app.style.display = "block";
  initPublicPage();

  window.scrollTo({
    top: app.offsetTop,
    behavior: "smooth"
  });
};
</script>

</body>
</html>

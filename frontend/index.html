<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ABNECH Basket</title>

  <link rel="stylesheet" href="./css/style.css" />
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet"/>

  <style>

  /* HERO */

  .hero{
    min-height:100vh;
    background:
      linear-gradient(to bottom, rgba(0,0,0,.7), rgba(0,0,0,.9)),
      url("./img/hero-bg.jpg") center/cover no-repeat;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    gap:1.5rem;
    padding:2rem;
  }

  .enter-btn{
    padding:1rem 2.5rem;
    border-radius:50px;
    border:none;
    background:#ff9800;
    color:#fff;
    font-weight:bold;
    cursor:pointer;
  }

  /* CARRUSEL LOGOS */

  .logos-bar{
    width:100%;
    background:#05080f;
    overflow:hidden;
    border-bottom:1px solid rgba(255,255,255,.1);
  }

  .logos-track{
    display:flex;
    width:max-content;
    animation: scrollLogos 35s linear infinite;
  }

  .logo-item{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0 22px;
    cursor:pointer;
  }

  .logo-item img{
    height:48px;
    object-fit:contain;
    transition:.3s;
  }

  .logo-item:hover img{
    transform:scale(1.15);
  }

  @keyframes scrollLogos{
    from{ transform:translateX(0); }
    to{ transform:translateX(-50%); }
  }

  #app{
    display:none;
    opacity:0;
    transform:translateY(20px);
    transition:.6s;
  }

  #app.show{
    opacity:1;
    transform:none;
  }

  </style>
</head>

<script type="module">

import { initPublicPage } from "./js/public.js";

const landing = document.getElementById("landing");
const app = document.getElementById("app");

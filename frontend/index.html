<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABNECH Basket</title>

  <!-- evita warning favicon -->
  <link rel="icon" href="data:,">

  <link rel="stylesheet" href="./css/style.css" />

  <style>
    /* ===== LANDING ===== */
    .landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 1.5rem;
      text-align: center;
      transition: opacity 0.6s ease;
    }

    .landing.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .enter-btn {
      padding: 1rem 2.8rem;
      font-size: 1.2rem;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: #ff6b00;
      color: #fff;
      font-weight: bold;
    }

    /* ===== APP ===== */
    #app {
      display: none;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    #app.show {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body>

  <!-- LANDING (ÚNICO LUGAR DONDE EXISTE EL BOTÓN) -->
  <section id="landing" class="landing">
    <h1>ABNECH Basket</h1>
    <p>Liga Regional de Básquet</p>
    <button class="enter-btn" id="enterBtn">Entrar</button>
  </section>

  <!-- APP -->
  <div id="app">

    <header class="site-header">
      <span class="logo-main">ABNECH Basket</span>
    </header>

    <main>
      <div class="content-area">

        <!-- FIXTURE -->
        <section id="fixture" class="section-block">
          <h2>FIXTURE</h2>

          <div id="fixture-skeleton">
            <div class="skeleton skeleton-fixture"></div>
            <div class="skeleton skeleton-fixture"></div>
          </div>

          <div id="fixturesContainer">
            <div id="fixture-grid" class="fixture-grid"></div>
          </div>
        </section>

        <!-- TABLA -->
        <section id="tabla" class="section-block">
          <h2>TABLA DE POSICIONES</h2>

          <div id="table-skeleton">
            <div class="skeleton skeleton-row"></div>
            <div class="skeleton skeleton-row"></div>
            <div class="skeleton skeleton-row"></div>
          </div>

          <div class="standings-table-wrapper">
            <table class="standings-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Club</th>
                  <th>PJ</th>
                  <th>PG</th>
                  <th>PP</th>
                  <th>PF</th>
                  <th>PC</th>
                  <th>DG</th>
                  <th>PTS</th>
                </tr>
              </thead>
              <tbody id="standingsBody"></tbody>
            </table>
          </div>
        </section>

      </div>
    </main>

    <footer class="site-footer">
      <p>© 2025 ABNECH Basket (MecInfoTec)</p>
    </footer>
  </div>

  <!-- SCRIPT -->
  <script type="module">
    import { initPublicPage } from "./js/public.js";

    const landing = document.getElementById("landing");
    const app = document.getElementById("app");
    const enterBtn = document.getElementById("enterBtn");

    const entered = localStorage.getItem("abnech_entered");

    if (entered === "true") {
      landing.remove();            // 🔑 clave: elimina el landing
      app.classList.add("show");
      initPublicPage();
    } else {
      enterBtn.addEventListener("click", () => {
        localStorage.setItem("abnech_entered", "true");
        landing.classList.add("fade-out");

        setTimeout(() => {
          landing.remove();        // 🔑 nunca queda visible
          app.classList.add("show");
          initPublicPage();
        }, 600);
      });
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ABNECH Basket</title>

  <link rel="stylesheet" href="./css/style.css" />

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet"/>

  <style>

    /* HERO */

    .hero {
      min-height: 100vh;
      background:
        linear-gradient(to bottom, rgba(0,0,0,.7), rgba(0,0,0,.9)),
        url("./img/hero-bg.jpg") center/cover no-repeat;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      text-align: center;
      gap: 1.4rem;
      padding: 2rem;
    }

    /* SLIDER */

    .hero-slider {
      width: 100%;
      max-width: 900px;
      height: 180px;

      overflow: hidden;
      border-radius: 16px;

      box-shadow: 0 12px 30px rgba(0,0,0,.6);
    }

    .hero-slider img {
      width: 100%;
      height: 100%;

      object-fit: contain;
      background: rgba(0,0,0,.4);

      animation: fade 12s infinite;
    }

    @keyframes fade {
      0% { opacity: 1; }
      25% { opacity: 0; }
      50% { opacity: 1; }
      75% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* TITULOS */

    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      letter-spacing: 1px;
    }

    .hero p {
      font-size: 1.1rem;
      opacity: .9;
      max-width: 600px;
    }

    /* BOTON */

    .enter-btn {
      padding: 1rem 2.6rem;
      font-size: 1.1rem;
      border-radius: 50px;
      border: none;
      cursor: pointer;

      background: linear-gradient(135deg,#ff6b00,#ff9c42);
      color: #fff;

      font-weight: bold;
      transition: .3s;
    }

    .enter-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(255,107,0,.4);
    }

    /* BANNER FECHAS */

    .match-banner {
      margin-top: 1rem;

      background: rgba(0,0,0,.6);
      border: 1px solid rgba(255,255,255,.15);

      padding: .7rem 1.2rem;
      border-radius: 10px;

      font-size: .9rem;

      display: flex;
      flex-direction: column;
      gap: .3rem;

      max-width: 600px;
      width: 100%;
    }

    .match-banner span {
      color: #ffb74d;
      font-weight: 500;
    }

    /* LOGOS */

    .club-logos {
      margin-top: 1.5rem;

      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;

      justify-content: center;
      align-items: center;

      max-width: 900px;
    }

    .club-logos img {
      max-height: 48px;
      width: auto;

      object-fit: contain;

      filter: drop-shadow(0 2px 6px rgba(0,0,0,.6));
    }

    /* APP */

    #app {
      opacity: 0;
      transform: translateY(20px);
      transition: .6s ease;
    }

    #app.show {
      opacity: 1;
      transform: translateY(0);
    }

  </style>
</head>

<body>

<!-- LANDING -->
<section id="landing" class="hero">

  <!-- SLIDER -->
  <div class="hero-slider">

    <img src="./img/anima.gif" id="slideImg">

  </div>

  <h1 data-aos="fade-down">ABNECH Basket</h1>

  <p data-aos="fade-up">
    Liga Regional de Básquet del Chaco
  </p>

  <!-- BANNER -->
  <div class="match-banner" id="matchBanner">

    <div>
      🟠 Próxima:
      <span id="nextMatch">Cargando...</span>
    </div>

    <div>
      🔵 Último:
      <span id="lastMatch">Cargando...</span>
    </div>

  </div>

  <button
    class="enter-btn"
    id="enterBtn"
  >
    Ver Fixture
  </button>

  <!-- LOGOS -->
  <div class="club-logos">

    <img src="./img/clubs/union.png">
    <img src="./img/clubs/funebrero.png">
    <img src="./img/clubs/cfa.png">
    <img src="./img/clubs/general-vedia.png">
    <img src="./img/clubs/la-leonesa.png">
    <img src="./img/clubs/palermo-cap.png">
    <img src="./img/clubs/puerto-bermejo.png">
    <img src="./img/clubs/zapallar.png">

  </div>

</section>

<!-- APP -->
<div id="app" style="display:none">

  <header class="site-header">

    <span class="logo-main">ABNECH Basket</span>

    <a
      id="adminLink"
      href="/admin/admin.html"
      style="display:none;margin-left:auto;font-size:1.4rem;"
    >
      ⚙️
    </a>

  </header>

  <main>

    <div class="content-area">

      <section class="section-block">

        <h2>FIXTURE</h2>

        <div class="fixture-filters">

          <input id="filter-round" type="number" min="1" placeholder="Jornada">

          <select id="filter-status">
            <option value="all">Todos</option>
            <option value="finished">Jugados</option>
            <option value="pending">Pendientes</option>
          </select>

          <select id="filter-club">
            <option value="all">Todos</option>
          </select>

        </div>

        <div id="fixture-grid"></div>

      </section>

      <section class="section-block">

        <h2>TABLA</h2>

        <div class="standings-table-wrapper">

          <table class="standings-table">

            <thead>
              <tr>
                <th>#</th>
                <th>Club</th>
                <th>PJ</th>
                <th>PG</th>
                <th>PP</th>
                <th>PF</th>
                <th>PC</th>
                <th>DG</th>
                <th>PTS</th>
              </tr>
            </thead>

            <tbody id="standingsBody"></tbody>

          </table>

        </div>

      </section>

    </div>

  </main>

</div>

<!-- AOS -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script type="module">

  import { initPublicPage } from "./js/public.js";

  AOS.init();

  /* SLIDER */

  const slides = [
    "./img/anima.gif",
    "./img/anima-1.gif",
    "./img/anima-2.gif",
    "./img/S2Bc.gif"
  ];

  let index = 0;
  const img = document.getElementById("slideImg");

  setInterval(() => {
    index = (index + 1) % slides.length;
    img.src = slides[index];
  }, 4000);


  /* LANDING */

  const landing = document.getElementById("landing");
  const app = document.getElementById("app");

  app.style.display = "none";

  document.getElementById("enterBtn").onclick = () => {

    landing.remove();

    app.style.display = "block";

    requestAnimationFrame(() => app.classList.add("show"));

    initPublicPage();
  };


  /* BANNER DATA */

  async function loadBanner() {

    try {

      const res = await fetch("https://abnech.onrender.com/api/fixtures/B1");

      const data = await res.json();

      const finished = data.filter(f =>
        f.scoreLocal !== null && f.scoreAway !== null
      );

      const pending = data.filter(f =>
        f.scoreLocal === null || f.scoreAway === null
      );

      const last = finished.at(-1);
      const next = pending[0];

      if (last) {
        document.getElementById("lastMatch").textContent =
          `${last.homeClubId} ${last.scoreLocal} - ${last.scoreAway} ${last.awayClubId}`;
      }

      if (next) {
        document.getElementById("nextMatch").textContent =
          `${next.homeClubId} vs ${next.awayClubId} (${next.date})`;
      }

    } catch {
      console.log("Error banner");
    }
  }

  loadBanner();

</script>

</body>
</html>

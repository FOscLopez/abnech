<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ABNECH Basket</title>

  <link rel="stylesheet" href="./css/style.css" />

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet"/>

  <style>

    /* HERO */

    .hero {
      min-height: 100vh;
      background:
        linear-gradient(to bottom, rgba(0,0,0,.7), rgba(0,0,0,.9)),
        url("./img/hero-bg.jpg") center/cover no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 1.5rem;
      padding: 2rem;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
    }

    .hero p {
      font-size: 1.2rem;
      opacity: .9;
      max-width: 600px;
    }

    .enter-btn {
      padding: 1rem 2.8rem;
      font-size: 1.1rem;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg,#ff6b00,#ff9c42);
      color: #fff;
      font-weight: bold;
      transition: .3s;
    }

    .enter-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(255,107,0,.4);
    }

    /* LOGOS LANDING */

    .club-logos {
      margin-top: 1.5rem;
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      max-width: 900px;
    }

    .club-logos img {
      max-height: 45px;
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,.6));
    }

    /* TRANSICIÓN APP */

    #app {
      opacity: 0;
      transform: translateY(20px);
      transition: .6s ease;
    }

    #app.show {
      opacity: 1;
      transform: translateY(0);
    }

  </style>
</head>

<body>

<!-- LANDING -->
<section id="landing" class="hero">

  <h1 data-aos="fade-down">ABNECH Basket</h1>

  <p data-aos="fade-up" data-aos-delay="200">
    Liga Regional del Nordeste Chaqueño
  </p>

  <div class="banner-info">
    ⏰ Próxima: <b>A confirmar</b> &nbsp; | &nbsp; 🏀 Última: <b>A confirmar</b>
  </div>

  <button
    class="enter-btn"
    id="enterBtn"
    data-aos="zoom-in"
    data-aos-delay="400"
  >
    Ver Fixture
  </button>

  <div class="club-logos">

    <img src="./img/clubs/union.png">
    <img src="./img/clubs/funebrero.png">
    <img src="./img/clubs/cfa.png">
    <img src="./img/clubs/general-vedia.png">
    <img src="./img/clubs/la-leonesa.png">
    <img src="./img/clubs/palermo-cap.png">
    <img src="./img/clubs/puerto-bermejo.png">
    <img src="./img/clubs/zapallar.png">

  </div>

</section>


<!-- APP -->
<div id="app" style="display:none">

  <!-- MARQUESINA LOGOS -->
  <div class="logos-marquee">

    <div class="logos-track">

      <img src="./img/clubs/union.png">
      <img src="./img/clubs/funebrero.png">
      <img src="./img/clubs/cfa.png">
      <img src="./img/clubs/general-vedia.png">
      <img src="./img/clubs/la-leonesa.png">
      <img src="./img/clubs/palermo-cap.png">
      <img src="./img/clubs/puerto-bermejo.png">
      <img src="./img/clubs/zapallar.png">

      <!-- duplicado para loop -->
      <img src="./img/clubs/union.png">
      <img src="./img/clubs/funebrero.png">
      <img src="./img/clubs/cfa.png">
      <img src="./img/clubs/general-vedia.png">
      <img src="./img/clubs/la-leonesa.png">
      <img src="./img/clubs/palermo-cap.png">
      <img src="./img/clubs/puerto-bermejo.png">
      <img src="./img/clubs/zapallar.png">

    </div>

  </div>


  <!-- HEADER -->
  <header class="site-header">

    <span class="logo-main">ABNECH Basket</span>

    <a
      id="adminLink"
      href="/admin/admin.html"
      style="display:none;margin-left:auto;font-size:1.4rem;"
    >
      ⚙️
    </a>

  </header>


  <main>

    <div class="content-area">

      <!-- FIXTURE -->

      <section class="section-block">

        <h2>FIXTURE</h2>

        <div class="fixture-filters">

          <input id="filter-round" type="number" min="1" placeholder="Jornada">

          <select id="filter-status">
            <option value="all">Todos</option>
            <option value="finished">Jugados</option>
            <option value="pending">Pendientes</option>
          </select>

          <select id="filter-club">
            <option value="all">Todos los clubes</option>
          </select>

        </div>

        <div id="fixture-grid" class="fixture-grid"></div>

      </section>


      <!-- TABLA -->

      <section class="section-block">

        <h2>TABLA DE POSICIONES</h2>

        <div id="stats-summary" class="stats-summary"></div>

        <div class="standings-table-wrapper">

          <table class="standings-table">

            <thead>
              <tr>
                <th>#</th>
                <th>Club</th>
                <th>PJ</th>
                <th>PG</th>
                <th>PP</th>
                <th>PF</th>
                <th>PC</th>
                <th>DG</th>
                <th>PTS</th>
              </tr>
            </thead>

            <tbody id="standingsBody"></tbody>

          </table>

        </div>

      </section>

    </div>

  </main>


  <footer class="site-footer">
    <p>© 2026 ABNECH Basket</p>
  </footer>

</div>


<!-- AOS -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script type="module">

  import { initPublicPage } from "./js/public.js";

  AOS.init({
    duration: 800,
    once: true
  });

  const landing = document.getElementById("landing");
  const app = document.getElementById("app");

  document.getElementById("enterBtn").onclick = () => {

    landing.remove();

    app.style.display = "block";

    requestAnimationFrame(() => app.classList.add("show"));

    initPublicPage();
  };

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABNECH Basket</title>

  <link rel="stylesheet" href="./css/style.css">

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <nav>
    <a href="#hero">Inicio</a>
    <a href="#fixture">Fixture</a>
    <a href="#clubs">Clubes</a>
  </nav>
</header>

<!-- HERO -->
<section id="hero" class="hero">

  <div class="hero-container">

    <div class="hero-logo">
      <img src="./img/logo-abnech.png">
    </div>

    <div class="hero-text">
      <h1>ABNECH <span>BASKET</span></h1>
      <p>Liga Regional del Nordeste Chaqueño</p>
      <a href="#fixture" class="primary-btn">Ver Fixture</a>
    </div>

  </div>

  <!-- BANNER -->
  <div class="clubs-banner">
    <div class="clubs-track">

      <!-- 8 logos -->
      <img src="./img/clubs/union.png">
      <img src="./img/clubs/funebrero.png">
      <img src="./img/clubs/cfa.png">
      <img src="./img/clubs/general-vedia.png">
      <img src="./img/clubs/la-leonesa.png">
      <img src="./img/clubs/palermo-cap.png">
      <img src="./img/clubs/puerto-bermejo.png">
      <img src="./img/clubs/zapallar.png">

      <!-- duplicado -->
      <img src="./img/clubs/union.png">
      <img src="./img/clubs/funebrero.png">
      <img src="./img/clubs/cfa.png">
      <img src="./img/clubs/general-vedia.png">
      <img src="./img/clubs/la-leonesa.png">
      <img src="./img/clubs/palermo-cap.png">
      <img src="./img/clubs/puerto-bermejo.png">
      <img src="./img/clubs/zapallar.png">

    </div>
  </div>

</section>

<!-- CLUBES -->
<section id="clubs" class="clubs">
  <h2><span>CLUBES</span> PARTICIPANTES</h2>
  <div id="clubs-container" class="club-grid"></div>
</section>

<!-- PROXIMA FECHA -->
<section class="next-match">

  <h2>PRÓXIMA FECHA</h2>

  <div class="match-highlight">

    <div class="team">
      <img src="./img/clubs/funebrero.png">
      <p>Funebrero</p>
    </div>

    <div class="vs">VS</div>

    <div class="team">
      <img src="./img/clubs/union.png">
      <p>Unión</p>
    </div>

  </div>

  <div class="match-info">
    25 Marzo - 21:30 hs
  </div>

</section>

<!-- FIXTURE -->
<section id="fixture" class="fixture">

  <h2><span>FIXTURE</span></h2>

  <div class="match-card">
    <span class="date">2025-06-21</span>
    <div class="teams">
      <span>Funebrero</span>
      <strong>89 - 70</strong>
      <span>Unión</span>
    </div>
  </div>

</section>

<script src="./js/clubs.js"></script>
<script src="./js/main.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABNECH Basket</title>

  <link rel="stylesheet" href="./css/style.css" />
</head>

<body>

  <header class="site-header">
    <span class="logo-main">ABNECH Basket</span>
  </header>

  <main id="app">

    <section id="fixture" class="section-block">
      <h2>FIXTURE</h2>
      <div id="fixture-grid" class="match-grid"></div>
    </section>

    <section id="tabla" class="section-block">
      <h2>TABLA DE POSICIONES</h2>
      <div class="standings-table-wrapper">
        <table class="standings-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Club</th>
              <th>PJ</th>
              <th>PG</th>
              <th>PP</th>
              <th>PF</th>
              <th>PC</th>
              <th>DG</th>
              <th>PTS</th>
            </tr>
          </thead>
          <tbody id="standingsBody"></tbody>
        </table>
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <p>© 2025 ABNECH Basket (MecInfoTec)</p>
  </footer>

  <!-- 🔴 SOLO ESTE SCRIPT -->
  <script type="module" src="./js/public.js"></script>
</body>
</html>

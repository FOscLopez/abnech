<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ABNECH Basket</title>

  <link rel="stylesheet" href="./css/style.css" />
</head>

<body>

<!-- LANDING -->
<section id="landing" class="hero">

  <h1>ABNECH Basket</h1>

  <p>Liga Regional del Nordeste Chaqueño</p>

  <button class="enter-btn" id="enterBtn">
    Ver Fixture
  </button>

  <!-- LOGOS SOLO UNA VEZ -->
  <div class="club-logos">

    <img src="./img/clubs/union.png">
    <img src="./img/clubs/funebrero.png">
    <img src="./img/clubs/cfa.png">
    <img src="./img/clubs/general-vedia.png">
    <img src="./img/clubs/la-leonesa.png">
    <img src="./img/clubs/palermo-cap.png">
    <img src="./img/clubs/puerto-bermejo.png">
    <img src="./img/clubs/zapallar.png">

  </div>

</section>


<!-- APP -->
<div id="app" style="display:none">

  <!-- BANNER ANIMADO -->
  <div class="clubs-marquee">
    <div class="marquee-track">

      <!-- DUPLICADO PARA LOOP -->
      <a href="./clubs/union.html"><img src="./img/clubs/union.png"></a>
      <a href="./clubs/funebrero.html"><img src="./img/clubs/funebrero.png"></a>
      <a href="./clubs/cfa.html"><img src="./img/clubs/cfa.png"></a>
      <a href="./clubs/general-vedia.html"><img src="./img/clubs/general-vedia.png"></a>
      <a href="./clubs/la-leonesa.html"><img src="./img/clubs/la-leonesa.png"></a>
      <a href="./clubs/palermo-cap.html"><img src="./img/clubs/palermo-cap.png"></a>
      <a href="./clubs/puerto-bermejo.html"><img src="./img/clubs/puerto-bermejo.png"></a>
      <a href="./clubs/zapallar.html"><img src="./img/clubs/zapallar.png"></a>

      <!-- COPIA -->
      <a href="./clubs/union.html"><img src="./img/clubs/union.png"></a>
      <a href="./clubs/funebrero.html"><img src="./img/clubs/funebrero.png"></a>
      <a href="./clubs/cfa.html"><img src="./img/clubs/cfa.png"></a>
      <a href="./clubs/general-vedia.html"><img src="./img/clubs/general-vedia.png"></a>
      <a href="./clubs/la-leonesa.html"><img src="./img/clubs/la-leonesa.png"></a>
      <a href="./clubs/palermo-cap.html"><img src="./img/clubs/palermo-cap.png"></a>
      <a href="./clubs/puerto-bermejo.html"><img src="./img/clubs/puerto-bermejo.png"></a>
      <a href="./clubs/zapallar.html"><img src="./img/clubs/zapallar.png"></a>

    </div>
  </div>


  <header class="site-header">
    ABNECH Basket
  </header>


  <main>

    <section class="section-block">

      <h2>FIXTURE</h2>

      <div class="fixture-filters">

        <input id="filter-round" type="number" placeholder="Jornada">

        <select id="filter-status">
          <option value="all">Todos</option>
          <option value="finished">Jugados</option>
          <option value="pending">Pendientes</option>
        </select>

        <select id="filter-club">
          <option value="all">Todos</option>
        </select>

      </div>

      <div id="fixture-grid"></div>

    </section>


    <section class="section-block">

      <h2>TABLA</h2>

      <div class="standings-table-wrapper">

        <table class="standings-table">

          <thead>
            <tr>
              <th>#</th>
              <th>Club</th>
              <th>PJ</th>
              <th>PG</th>
              <th>PP</th>
              <th>PF</th>
              <th>PC</th>
              <th>DG</th>
              <th>PTS</th>
            </tr>
          </thead>

          <tbody id="standingsBody"></tbody>

        </table>

      </div>

    </section>

  </main>


  <footer class="site-footer">
    © 2026 ABNECH Basket
  </footer>

</div>


<script type="module">

import { initPublicPage } from "./js/public.js";

const landing = document.getElementById("landing");
const app = document.getElementById("app");

document.getElementById("enterBtn").onclick = () => {

  landing.remove();

  app.style.display = "block";

  initPublicPage();

};

</script>

</body>
</html>

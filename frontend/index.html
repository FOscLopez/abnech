<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ABNECH Basket</title>

  <link rel="stylesheet" href="./css/style.css" />

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet"/>

  <style>

    /* HERO */

    .hero {
      min-height: 100vh;
      background:
        linear-gradient(to bottom, rgba(0,0,0,.7), rgba(0,0,0,.9)),
        url("./img/hero-bg.jpg") center/cover no-repeat;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;

      gap: 1.4rem;
      padding: 2rem;
    }

    /* SLIDER */

    .hero-slider {
      width: 100%;
      max-width: 320px;
      margin-bottom: .8rem;
    }

    .hero-slider img {
      width: 100%;
      height: auto;
      max-height: 220px;
      object-fit: contain;
      display: block;
      margin: auto;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
    }

    .hero p {
      font-size: 1.1rem;
      opacity: .9;
      max-width: 600px;
    }

    /* BANNER */

    .match-banner {
      background: rgba(0,0,0,.55);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 14px;

      padding: .5rem 1rem;

      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;

      font-size: .85rem;
    }

    .match-banner span {
      color: #ff9c42;
      font-weight: 600;
    }

    /* BOTÓN */

    .enter-btn {
      padding: .9rem 2.6rem;
      font-size: 1.05rem;
      border-radius: 50px;
      border: none;
      cursor: pointer;

      background: linear-gradient(135deg,#ff6b00,#ff9c42);
      color: #fff;
      font-weight: bold;

      transition: .3s;
    }

    .enter-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(255,107,0,.4);
    }

    /* LOGOS */

    .club-logos {
      margin-top: 1.2rem;

      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;

      max-width: 900px;
    }

    .club-logos img {
      max-height: 46px;
      width: auto;

      object-fit: contain;

      filter: drop-shadow(0 2px 6px rgba(0,0,0,.6));
    }

    /* APP */

    #app {
      opacity: 0;
      transform: translateY(20px);
      transition: .6s ease;
    }

    #app.show {
      opacity: 1;
      transform: translateY(0);
    }

  </style>
</head>

<body>

<!-- HERO -->
<section id="landing" class="hero">

  <!-- SLIDER -->
  <div class="hero-slider">
    <img src="./img/anima.gif" alt="Animación ABNECH">
  </div>

  <h1 data-aos="fade-down">ABNECH Basket</h1>

  <p data-aos="fade-up" data-aos-delay="200">
    Liga Regional del Nordeste Chaqueño
  </p>

  <!-- BANNER -->
  <div class="match-banner" data-aos="fade-up" data-aos-delay="300">
    <div>⏰ Próxima: <span>A confirmar</span></div>
    <div>🏀 Última: <span>A confirmar</span></div>
  </div>

  <button
    class="enter-btn"
    id="enterBtn"
    data-aos="zoom-in"
    data-aos-delay="400"
  >
    Ver Fixture
  </button>

  <!-- LOGOS -->
  <div class="club-logos">

    <img src="./img/clubs/union.png">
    <img src="./img/clubs/funebrero.png">
    <img src="./img/clubs/cfa.png">
    <img src="./img/clubs/general-vedia.png">
    <img src="./img/clubs/la-leonesa.png">
    <img src="./img/clubs/palermo-cap.png">
    <img src="./img/clubs/puerto-bermejo.png">
    <img src="./img/clubs/zapallar.png">

  </div>

</section>

<!-- APP -->
<div id="app" style="display:none">

  <header class="site-header">

    <span class="logo-main">ABNECH Basket</span>

    <a
      id="adminLink"
      href="/admin/admin.html"
      style="display:none;margin-left:auto;font-size:1.4rem;"
    >
      ⚙️
    </a>

  </header>

  <main>
    <div class="content-area">

      <section class="section-block">
        <h2>FIXTURE</h2>

        <div class="fixture-filters">

          <input id="filter-round" type="number" min="1" placeholder="Jornada">

          <select id="filter-status">
            <option value="all">Todos</option>
            <option value="finished">Jugados</option>
            <option value="pending">Pendientes</option>
          </select>

          <select id="filter-club">
            <option value="all">Todos los clubes</option>
          </select>

        </div>

        <div id="fixture-grid"></div>
      </section>

      <section class="section-block">

        <h2>TABLA DE POSICIONES</h2>

        <div class="standings-table-wrapper">

          <table class="standings-table">

            <thead>
              <tr>
                <th>#</th>
                <th>Club</th>
                <th>PJ</th>
                <th>PG</th>
                <th>PP</th>
                <th>PF</th>
                <th>PC</th>
                <th>DG</th>
                <th>PTS</th>
              </tr>
            </thead>

            <tbody id="standingsBody"></tbody>

          </table>

        </div>

      </section>

    </div>
  </main>

  <footer class="site-footer">
    <p>© 2026 ABNECH Basket</p>
  </footer>

</div>

<!-- AOS -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script type="module">

  import { initPublicPage } from "./js/public.js";

  AOS.init({
    duration: 800,
    once: true,
  });

  const landing = document.getElementById("landing");
  const app = document.getElementById("app");

  document.getElementById("enterBtn").onclick = () => {

    landing.remove();

    app.style.display = "block";

    requestAnimationFrame(() => app.classList.add("show"));

    initPublicPage();
  };

</script>

</body>
</html>

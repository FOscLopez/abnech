<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ABNECH Basket</title>

<link rel="stylesheet" href="./css/style.css">

</head>

<body>

<header class="main-header">
  <div class="container header-content">
    <h1 class="logo">ABNECH Basket</h1>
  </div>
</header>

<!-- ================= HERO + SLIDER ================= -->

<section class="hero">

  <div class="hero-slider">

    <div class="slide active">
      <img src="./img/anima.gif">
    </div>

  </div>

  <div class="hero-content container">
    <h1>Liga Regional de Básquet</h1>
    <p>Resultados, estadísticas y toda la acción</p>

    <button id="enterBtn" class="primary-btn">
      Ver Fixture
    </button>
  </div>

</section>

<!-- ================= LOGOS ================= -->

<section class="logos-marquee">
  <div class="logos-track">

    <img src="./img/clubs/funebrero.png">
    <img src="./img/clubs/union.png">
    <img src="./img/clubs/cfa.png">
    <img src="./img/clubs/zapallar.png">

    <!-- DUPLICADO PARA LOOP -->
    <img src="./img/clubs/funebrero.png">
    <img src="./img/clubs/union.png">
    <img src="./img/clubs/cfa.png">
    <img src="./img/clubs/zapallar.png">

  </div>
</section>

<!-- ================= APP ================= -->

<div id="app" style="display:none">

<main class="container">

<!-- ================= PROXIMA FECHA ================= -->

<section class="card-section">

  <h2>📅 Próxima Fecha</h2>

  <div class="match-highlight">

    <div class="team">
      <img src="./img/clubs/funebrero.png">
      <span>Funebrero</span>
    </div>

    <div class="vs">VS</div>

    <div class="team">
      <img src="./img/clubs/union.png">
      <span>Unión</span>
    </div>

    <div class="match-info">
      Domingo 20:00 hs
    </div>

  </div>

</section>

<!-- ================= RESULTADOS ================= -->

<section class="card-section">

  <h2>📊 Últimos Resultados</h2>

  <div class="results-grid">

    <div class="result-card">
      <span>Funebrero</span>
      <strong>78 - 70</strong>
      <span>Unión</span>
    </div>

    <div class="result-card">
      <span>CFA</span>
      <strong>65 - 60</strong>
      <span>Zapallar</span>
    </div>

  </div>

</section>

<!-- ================= FIXTURE ================= -->

<section class="card-section">
  <h2>Fixture</h2>
  <div id="fixture-grid"></div>
</section>

<!-- ================= TABLA ================= -->

<section class="card-section">
  <h2>Tabla</h2>

  <div class="standings-table-wrapper">
    <table class="standings-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Club</th>
          <th>PJ</th>
          <th>PG</th>
          <th>PP</th>
          <th>PF</th>
          <th>PC</th>
          <th>DG</th>
          <th>PTS</th>
        </tr>
      </thead>
      <tbody id="standingsBody"></tbody>
    </table>
  </div>

</section>

</main>

</div>

<footer class="site-footer">
© 2026 ABNECH Basket
</footer>

<script type="module">
import { initPublicPage } from "./js/public.js";

const btn = document.getElementById("enterBtn");
const app = document.getElementById("app");

btn.onclick = () => {
  app.style.display = "block";
  initPublicPage();

  window.scrollTo({
    top: app.offsetTop,
    behavior: "smooth"
  });
};
</script>

</body>
</html>

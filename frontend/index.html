<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABNECH Basket</title>

  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./css/style.css" />

  <style>
    .landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 1.5rem;
      text-align: center;
    }

    .enter-btn {
      padding: 1rem 2.8rem;
      font-size: 1.2rem;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: #ff6b00;
      color: #fff;
      font-weight: bold;
    }

    #app {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    #app.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body>

  <!-- LANDING -->
  <section id="landing" class="landing">
    <h1>ABNECH Basket</h1>
    <p>Liga Regional de Básquet</p>
    <button class="enter-btn" id="enterBtn">Entrar</button>
  </section>

  <!-- APP -->
  <div id="app" style="display:none">
    <header class="site-header">
      <span class="logo-main">ABNECH Basket</span>
    </header>

    <main>
      <div class="content-area">

        <!-- FIXTURE -->
        <section class="section-block">
          <h2>FIXTURE</h2>

          <div class="fixture-filters">
            <input id="filter-round" type="number" min="1" placeholder="Jornada">
            <select id="filter-status">
              <option value="all">Todos</option>
              <option value="finished">Jugados</option>
              <option value="pending">Pendientes</option>
            </select>
            <select id="filter-club">
              <option value="all">Todos los clubes</option>
            </select>
          </div>

          <div id="fixture-skeleton">
            <div class="skeleton skeleton-fixture"></div>
            <div class="skeleton skeleton-fixture"></div>
          </div>

          <div id="fixture-grid" class="fixture-grid"></div>
        </section>

                <!-- TABLA -->
        <section class="section-block">
          <h2>TABLA DE POSICIONES</h2>

          <!-- 🔹 PANEL RESUMEN STATS -->
          <div id="stats-summary" class="stats-summary">
            <div class="stat-item">
              <span class="stat-label">Partidos</span>
              <span id="stat-games" class="stat-value">–</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">Líder</span>
              <span id="stat-leader" class="stat-value">–</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">Mejor ataque</span>
              <span id="stat-attack" class="stat-value">–</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">Mejor defensa</span>
              <span id="stat-defense" class="stat-value">–</span>
            </div>
          </div>

          <div class="standings-table-wrapper">
            <table class="standings-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Club</th>
                  <th>PJ</th>
                  <th>PG</th>
                  <th>PP</th>
                  <th>PF</th>
                  <th>PC</th>
                  <th>DG</th>
                  <th>PTS</th>
                </tr>
              </thead>
              <tbody id="standingsBody"></tbody>
            </table>
          </div>
        </section>


          <div id="table-skeleton">
            <div class="skeleton skeleton-row"></div>
            <div class="skeleton skeleton-row"></div>
          </div>

          <div class="standings-table-wrapper">
            <table class="standings-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Club</th>
                  <th>PJ</th>
                  <th>PG</th>
                  <th>PP</th>
                  <th>PF</th>
                  <th>PC</th>
                  <th>DG</th>
                  <th>PTS</th>
                </tr>
              </thead>
              <tbody id="standingsBody"></tbody>
            </table>
          </div>
        </section>

      </div>
    </main>

    <footer class="site-footer">
      <p>© 2025 ABNECH Basket</p>
    </footer>
  </div>

  <script type="module">
    import { initPublicPage } from "./js/public.js";

    const entered =
      localStorage.getItem("abnech_entered") === "true" ||
      new URLSearchParams(location.search).has("cat");

    const landing = document.getElementById("landing");
    const app = document.getElementById("app");

    if (entered) {
      landing.remove();
      app.style.display = "block";
      requestAnimationFrame(() => app.classList.add("show"));
      initPublicPage();
    } else {
      document.getElementById("enterBtn").onclick = () => {
        localStorage.setItem("abnech_entered", "true");
        location.reload();
      };
    }
  </script>

</body>
</html>

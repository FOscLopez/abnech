<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABNECH Basket</title>

  <link rel="stylesheet" href="./css/style.css">
</head>

<body>

<!-- ================= HERO ================= -->

<section class="hero">

  <!-- CONTENIDO -->
  <div class="hero-content">
    <h1>Liga Regional de Básquet</h1>
    <p>Resultados, estadísticas y toda la acción</p>

    <button id="enterBtn" class="primary-btn">
      Ver Fixture
    </button>

    <!-- 🔥 BANNER LOGOS (NUEVO) -->
    <div class="clubs-banner">

      <div class="clubs-track">

        <!-- LOGOS -->
        <img src="./img/clubs/funebrero.png">
        <img src="./img/clubs/union.png">
        <img src="./img/clubs/cfa.png">
        <img src="./img/clubs/general-vedia.png">
        <img src="./img/clubs/la-leonesa.png">
        <img src="./img/clubs/palermo-cap.png">
        <img src="./img/clubs/puerto-bermejo.png">
        <img src="./img/clubs/zapallar.png">

        <!-- DUPLICADO PARA LOOP SUAVE -->
        <img src="./img/clubs/funebrero.png">
        <img src="./img/clubs/union.png">
        <img src="./img/clubs/cfa.png">
        <img src="./img/clubs/general-vedia.png">
        <img src="./img/clubs/la-leonesa.png">
        <img src="./img/clubs/palermo-cap.png">
        <img src="./img/clubs/puerto-bermejo.png">
        <img src="./img/clubs/zapallar.png">

      </div>

    </div>

  </div>

</section>

<!-- ================= APP ================= -->

<div id="app" style="display:none">

  <main>

    <section class="section-block">
      <h2>📅 Próxima Fecha</h2>

      <div class="match-highlight">
        <div class="team">
          <img src="./img/clubs/funebrero.png">
          <span>Funebrero</span>
        </div>

        <div class="vs">VS</div>

        <div class="team">
          <img src="./img/clubs/union.png">
          <span>Unión</span>
        </div>

        <div class="match-info">
          Domingo 20:00 hs
        </div>
      </div>
    </section>

    <section class="section-block">
      <h2>📊 Últimos Resultados</h2>

      <div class="results-grid">

        <div class="result-card">
          <span>Funebrero</span>
          <strong>78 - 70</strong>
          <span>Unión</span>
        </div>

        <div class="result-card">
          <span>CFA</span>
          <strong>65 - 60</strong>
          <span>Zapallar</span>
        </div>

      </div>
    </section>

    <section class="section-block">
      <h2>Fixture</h2>
      <div id="fixture-grid"></div>
    </section>

    <section class="section-block">
      <h2>Tabla</h2>

      <div class="standings-table-wrapper">
        <table class="standings-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Club</th>
              <th>PJ</th>
              <th>PG</th>
              <th>PP</th>
              <th>PF</th>
              <th>PC</th>
              <th>DG</th>
              <th>PTS</th>
            </tr>
          </thead>
          <tbody id="standingsBody"></tbody>
        </table>
      </div>

    </section>

  </main>

</div>

<footer class="site-footer">
  © 2026 ABNECH Basket
</footer>

<!-- ================= SCRIPTS ================= -->

<script type="module">
import { initPublicPage } from "./js/public.js";

const btn = document.getElementById("enterBtn");
const app = document.getElementById("app");

btn.onclick = () => {
  app.style.display = "block";
  initPublicPage();

  window.scrollTo({
    top: app.offsetTop,
    behavior: "smooth"
  });
};
</script>

</body>
</html>

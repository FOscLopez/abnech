<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ABNECH Basket</title>

  <link rel="stylesheet" href="./css/style.css" />

  <!-- AOS -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet"/>

  <style>

    /* HERO */

    .hero {
      min-height: 100vh;
      background:
        linear-gradient(to bottom, rgba(0,0,0,.7), rgba(0,0,0,.9)),
        url("./img/hero-bg.jpg") center/cover no-repeat;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 1.5rem;
      padding: 2rem;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
    }

    .hero p {
      font-size: 1.2rem;
      opacity: .9;
      max-width: 600px;
    }

    /* ================= SLIDER ================= */

    .hero-slider {
      width: 100%;
      max-width: 720px;
      overflow: hidden;
      border-radius: 16px;
      margin-bottom: 1rem;
      box-shadow: 0 10px 30px rgba(0,0,0,.6);
    }

    .hero-slider-track {
      display: flex;
      transition: transform .5s ease;
      touch-action: pan-y;
    }

    .hero-slide {
      min-width: 100%;
      user-select: none;
    }

    .hero-slide img {
      width: 100%;
      display: block;
    }

    /* ================= BANNER ================= */

    .date-banner {
      background: rgba(0,0,0,.6);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 12px;
      padding: .6rem 1rem;
      font-size: .9rem;
      display: flex;
      gap: 1.2rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .date-banner span {
      color: #ff9c42;
      font-weight: 600;
    }

    /* ================= BOTON ================= */

    .enter-btn {
      padding: 1rem 2.8rem;
      font-size: 1.1rem;
      border-radius: 50px;
      border: none;
      cursor: pointer;

      background: linear-gradient(135deg,#ff6b00,#ff9c42);
      color: #fff;
      font-weight: bold;
      transition: .3s;
    }

    .enter-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(255,107,0,.4);
    }

    /* ================= APP ================= */

    #app {
      opacity: 0;
      transform: translateY(20px);
      transition: .6s ease;
    }

    #app.show {
      opacity: 1;
      transform: translateY(0);
    }

  </style>
</head>

<body>

<!-- ================= LANDING ================= -->

<section id="landing" class="hero">

  <!-- SLIDER -->
  <div class="hero-slider" id="slider">
    <div class="hero-slider-track" id="sliderTrack">

      <div class="hero-slide">
        <img src="./img/anima.gif" alt="ABNECH">
      </div>

    </div>
  </div>

  <h1 data-aos="fade-down">ABNECH Basket</h1>

  <p data-aos="fade-up">
    Liga Regional del Nordeste Chaqueño
  </p>

  <!-- BANNER -->
  <div class="date-banner">
    <div>🕒 Próxima: <span id="nextMatch">A confirmar</span></div>
    <div>🏀 Última: <span id="lastMatch">A confirmar</span></div>
  </div>

  <button class="enter-btn" id="enterBtn">
    Ver Fixture
  </button>

</section>

<!-- ================= APP ================= -->

<div id="app" style="display:none">

  <header class="site-header">
    <span class="logo-main">ABNECH Basket</span>

    <a
      id="adminLink"
      href="/admin/admin.html"
      style="display:none;margin-left:auto;font-size:1.4rem;"
    >
      ⚙️
    </a>
  </header>

  <main>
    <div class="content-area">

      <!-- FIXTURE -->
      <section class="section-block">

        <h2>FIXTURE</h2>

        <div class="fixture-filters">

          <input id="filter-round" type="number" placeholder="Jornada">

          <select id="filter-status">
            <option value="all">Todos</option>
            <option value="finished">Jugados</option>
            <option value="pending">Pendientes</option>
          </select>

          <select id="filter-club">
            <option value="all">Todos</option>
          </select>

        </div>

        <div id="fixture-grid"></div>

      </section>

      <!-- TABLA -->
      <section class="section-block">

        <h2>TABLA</h2>

        <div class="standings-table-wrapper">

          <table class="standings-table">

            <thead>
              <tr>
                <th>#</th>
                <th>Club</th>
                <th>PJ</th>
                <th>PG</th>
                <th>PP</th>
                <th>PF</th>
                <th>PC</th>
                <th>DG</th>
                <th>PTS</th>
              </tr>
            </thead>

            <tbody id="standingsBody"></tbody>

          </table>

        </div>

      </section>

    </div>
  </main>

  <footer class="site-footer">
    <p>© 2026 ABNECH Basket (MecInfoTec)</p>
  </footer>

</div>

<!-- ================= SCRIPTS ================= -->

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script type="module">

  import { initPublicPage } from "./js/public.js";

  AOS.init();

  const landing = document.getElementById("landing");
  const app = document.getElementById("app");

  document.getElementById("enterBtn").onclick = () => {

    landing.remove();

    app.style.display = "block";

    requestAnimationFrame(() => {
      app.classList.add("show");
    });

    initPublicPage();
  };

  /* =============== SLIDER TACTIL =============== */

  const track = document.getElementById("sliderTrack");

  let startX = 0;
  let currentX = 0;
  let dragging = false;

  track.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
    dragging = true;
  });

  track.addEventListener("touchmove", e => {

    if (!dragging) return;

    currentX = e.touches[0].clientX;

    const diff = currentX - startX;

    track.style.transform = `translateX(${diff}px)`;
  });

  track.addEventListener("touchend", () => {

    dragging = false;

    track.style.transform = "translateX(0)";
  });

  /* =============== AUTO SLIDE =============== */

  setInterval(() => {
    track.style.opacity = ".85";

    setTimeout(() => {
      track.style.opacity = "1";
    }, 400);

  }, 5000);

</script>

</body>
</html>

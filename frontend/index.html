<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ABNECH Basket</title>

  <link rel="stylesheet" href="./css/style.css" />

  <!-- AOS Animations -->
  <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet"/>

  <style>

    /* HERO */

    .hero {
      min-height: 100vh;
      background:
        linear-gradient(to bottom, rgba(0,0,0,.7), rgba(0,0,0,.9)),
        url("./img/hero-bg.jpg") center/cover no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      gap: 1.5rem;
      padding: 2rem;
    }

    .hero h1 {
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 800;
      letter-spacing: 1px;
    }

    .hero p {
      font-size: 1.2rem;
      opacity: .9;
      max-width: 600px;
    }

    .enter-btn {
      padding: 1rem 2.8rem;
      font-size: 1.1rem;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg,#ff6b00,#ff9c42);
      color: #fff;
      font-weight: bold;
      transition: .3s;
    }

    .enter-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(255,107,0,.4);
    }

    /* ================= LOGOS LANDING ================= */

    .clubs-row {
      margin-top: 2.5rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 18px;
      max-width: 900px;
    }

    .club-logo {
      width: 64px;
      height: 64px;
      padding: 6px;
      background: rgba(255,255,255,0.04);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(6px);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 0 0 rgba(255,165,0,0.4);
      animation: pulseGlow 3s infinite ease-in-out;
      transition: transform .3s ease;
    }

    .club-logo:hover {
      transform: scale(1.15);
    }

    .club-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 0 6px rgba(255,165,0,.6));
    }

    @keyframes pulseGlow {
      0% {
        box-shadow: 0 0 0 rgba(255,165,0,0.2);
      }
      50% {
        box-shadow: 0 0 15px rgba(255,165,0,0.6);
      }
      100% {
        box-shadow: 0 0 0 rgba(255,165,0,0.2);
      }
    }

    /* TRANSICIÓN APP */

    #app {
      opacity: 0;
      transform: translateY(20px);
      transition: .6s ease;
    }

    #app.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* INFO SECTION */

    .info-section {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
      gap: 2rem;
      margin: 4rem 0;
    }

    .info-card {
      background: rgba(255,255,255,.03);
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
      transition: .3s;
      border: 1px solid rgba(255,255,255,.05);
    }

    .info-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,.4);
    }

    .info-card h3 {
      margin-bottom: .5rem;
      color: #ff9c42;
    }

  </style>
</head>

<body>

<!-- HERO / LANDING -->
<section id="landing" class="hero">

  <h1 data-aos="fade-down">ABNECH Basket</h1>

  <p data-aos="fade-up" data-aos-delay="200">
    Liga Regional de Básquet del Chaco
  </p>

  <button
    class="enter-btn"
    id="enterBtn"
    data-aos="zoom-in"
    data-aos-delay="400"
  >
    Ver Fixture
  </button>


  <!-- FILA LOGOS CLUBES -->
  <div class="clubs-row" data-aos="fade-up" data-aos-delay="600">

    <div class="club-logo">
      <img src="./img/clubs/union.png" alt="Unión">
    </div>

    <div class="club-logo">
      <img src="./img/clubs/funebrero.png" alt="Funebrero">
    </div>

    <div class="club-logo">
      <img src="./img/clubs/cfa.png" alt="CFA">
    </div>

    <div class="club-logo">
      <img src="./img/clubs/general-vedia.png" alt="General Vedia">
    </div>

    <div class="club-logo">
      <img src="./img/clubs/la-leonesa.png" alt="La Leonesa">
    </div>

    <div class="club-logo">
      <img src="./img/clubs/palermo-cap.png" alt="Palermo CAP">
    </div>

    <div class="club-logo">
      <img src="./img/clubs/puerto-bermejo.png" alt="Puerto Bermejo">
    </div>

    <div class="club-logo">
      <img src="./img/clubs/zapallar.png" alt="Zapallar">
    </div>

  </div>

</section>

<!-- APP -->
<div id="app" style="display:none">

  <header class="site-header" data-aos="fade-down">

    <span class="logo-main">ABNECH Basket</span>

    <a
      id="adminLink"
      href="/admin/admin.html"
      title="Panel Admin"
      style="display:none;margin-left:auto;font-size:1.4rem;"
    >
      ⚙️
    </a>

  </header>

  <main>
    <div class="content-area"></div>
  </main>

  <footer class="site-footer">
    <p>© 2026 ABNECH Basket</p>
  </footer>

</div>

<!-- AOS -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script type="module">

  import { initPublicPage } from "./js/public.js";

  AOS.init({
    duration: 800,
    once: true,
    easing: "ease-out"
  });

  const landing = document.getElementById("landing");
  const app = document.getElementById("app");

  app.style.display = "none";

  document.getElementById("enterBtn").onclick = () => {

    landing.remove();

    app.style.display = "block";

    requestAnimationFrame(() => app.classList.add("show"));

    initPublicPage();
  };

</script>

</body>
</html>

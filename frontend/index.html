<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ABNECH Basket</title>

  <!-- SEO -->
  <meta name="description" content="Liga ABNECH Basket - Resultados, fixture y clubes del Nordeste Chaqueño">

  <!-- PERFORMANCE -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- FUENTES -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="./css/style.css">

  <!-- JS (DEFER SOLO ACÁ) -->
  <script src="./js/clubs.js" defer></script>
  <script src="./js/main.js" defer></script>
</head>

<body>

<header class="main-header-pro">
  <div class="header-inner">

    <div class="fake-logo"></div>

    <nav class="header-nav">
      <a href="#hero" class="active">Inicio</a>
      <a href="#fixture">Fixture</a>
      <a href="#clubs">Clubes</a>
      <span class="nav-indicator"></span>
    </nav>

  </div>
</header>

<!-- HERO -->
<section id="hero" class="hero">

  <div class="logo-elite">
    <img src="./img/logo-abnech.png" loading="lazy">
  </div>

  <div class="hero-slider">
    <div class="slide active"><img src="./img/slide1.jpg"></div>
    <div class="slide"><img src="./img/slide2.jpg"></div>
    <div class="slide"><img src="./img/slide3.jpg"></div>
  </div>

  <canvas id="particles"></canvas>

  <div class="hero-content">

    <h1>ABNECH <span>BASKET</span></h1>
    <p class="subtitle">Liga Regional del Nordeste Chaqueño</p>

    <a href="#fixture" class="primary-btn">Ver Fixture</a>

    <!-- BANNER -->
    <div class="clubs-banner">
      <div class="clubs-track" id="clubs-track"></div>
    </div>

  </div>
</section>

<!-- CLUBES -->
<section id="clubs" class="clubs reveal">
  <h2><span>CLUBES</span> PARTICIPANTES</h2>
  <div id="clubs-container" class="club-grid"></div>
</section>

<!-- PROXIMA FECHA -->
<section class="next-match reveal">
  <h2>PRÓXIMA FECHA</h2>

  <div class="match-highlight">

    <div class="team">
      <img src="./img/clubs/funebrero.png">
      <p>Funebrero</p>
    </div>

    <div class="vs">VS</div>

    <div class="team">
      <img src="./img/clubs/union.png">
      <p>Unión</p>
    </div>

  </div>

  <div class="match-info">
    25 Marzo - 21:30 hs
  </div>
</section>

<!-- FIXTURE -->
<section id="fixture" class="fixture reveal">
  <h2><span>FIXTURE</span></h2>

  <div class="match-card">
    <span class="date">2025-06-21</span>
    <div class="teams">
      <span>Funebrero</span>
      <strong>89 - 70</strong>
      <span>Unión</span>
    </div>
  </div>

</section>

</body>
</html>

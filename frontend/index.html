<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>ABNECH Basket</title>

  <link rel="stylesheet" href="./css/style.css">

  <!-- FUENTES PRO -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
  <header class="main-header-pro">

    <div class="header-inner">
  
      <img src="./img/logo.png" class="header-logo">
  
      <nav class="header-nav">
        <a href="#">Inicio</a>
        <a href="#fixture">Fixture</a>
        <a href="#">Clubes</a>
      </nav>
  
    </div>
  
  </header>
<!-- HERO -->
<section class="hero">

  <!-- LOGO ELITE -->
  <div class="logo-elite">
    <img src="./img/logo-abnech.png" alt="ABNECH Logo">
  </div>

  <!-- SLIDER -->
  <div class="hero-slider">
    <div class="slide active"><img src="./img/slide1.jpg"></div>
    <div class="slide"><img src="./img/slide2.jpg"></div>
    <div class="slide"><img src="./img/slide3.jpg"></div>
  </div>

  <!-- PARTÍCULAS -->
  <canvas id="particles"></canvas>

  <div class="hero-content">
    
    <h1>ABNECH <span>BASKET</span></h1>

    <p>Liga Regional del Nordeste Chaqueño</p>

    <a href="#fixture" class="primary-btn">Ver Fixture</a>

    <!-- BANNER -->
    <div class="clubs-banner">
      <div class="clubs-track">
        <img src="./img/clubs/union.png">
        <img src="./img/clubs/funebrero.png">
        <img src="./img/clubs/cfa.png">
        <img src="./img/clubs/general-vedia.png">
        <img src="./img/clubs/la-leonesa.png">
        <img src="./img/clubs/palermo-cap.png">
        <img src="./img/clubs/puerto-bermejo.png">
        <img src="./img/clubs/zapallar.png">

        <!-- DUPLICADO -->
        <img src="./img/clubs/union.png">
        <img src="./img/clubs/funebrero.png">
        <img src="./img/clubs/cfa.png">
        <img src="./img/clubs/general-vedia.png">
        <img src="./img/clubs/la-leonesa.png">
        <img src="./img/clubs/palermo-cap.png">
        <img src="./img/clubs/puerto-bermejo.png">
        <img src="./img/clubs/zapallar.png">
      </div>
    </div>

  </div>
</section>

<section class="clubs">

  <h2><span>CLUBES</span> PARTICIPANTES</h2>

  <div id="clubs-container" class="club-grid"></div>

</section>

<!-- PROXIMA FECHA -->
<section class="next-match">

  <h2>PRÓXIMA FECHA</h2>

  <div class="match-highlight">

    <div class="team">
      <img src="./img/clubs/funebrero.png">
      <p>Funebrero</p>
    </div>

    <div class="vs">VS</div>

    <div class="team">
      <img src="./img/clubs/union.png">
      <p>Unión</p>
    </div>

  </div>

  <div class="match-info">
    25 Marzo - 21:30 hs
  </div>

</section>

<!-- FIXTURE -->
<section id="fixture" class="fixture">

  <h2><span>FIXTURE</span></h2>

  <div class="match-card">
    <span class="date">2025-06-21</span>
    <div class="teams">
      <span>Funebrero</span>
      <strong>89 - 70</strong>
      <span>Unión</span>
    </div>
  </div>

  <div class="match-card">
    <span class="date">2026-01-13</span>
    <div class="teams">
      <span>Palermo CAP</span>
      <strong>65 - 60</strong>
      <span>Puerto Bermejo</span>
    </div>
  </div>

</section>

<!-- SCRIPT -->
<script src="./js/clubs.js"></script>
<script src="./js/main.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ABNECH Basket</title>

  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body>

  <!-- LANDING -->
  <section id="landing" class="landing">
    <h1>ABNECH Basket</h1>
    <p>Liga Regional de Básquet</p>
    <button class="enter-btn" id="enterBtn">Entrar</button>
  </section>

  <!-- APP -->
  <div id="app" class="hidden" data-category="B1">

    <header class="site-header">
      <span class="logo-main">ABNECH Basket</span>
    </header>

    <main>
      <div class="content-area">

        <!-- FIXTURE -->
        <section class="section-block">
          <h2>FIXTURE</h2>

          <div class="filters-bar">
            <input id="filterRound" type="number" min="1" placeholder="Jornada" />
            <select id="filterStatus">
              <option value="all">Todos</option>
              <option value="scheduled">Programado</option>
              <option value="live">En juego</option>
              <option value="finished">Finalizado</option>
            </select>
            <select id="filterClub">
              <option value="all">Todos los clubes</option>
            </select>
          </div>

          <div id="fixture-skeleton">
            <div class="skeleton skeleton-fixture"></div>
            <div class="skeleton skeleton-fixture"></div>
          </div>

          <div id="fixture-grid" class="fixture-grid"></div>
        </section>

        <!-- TABLA -->
        <section class="section-block">
          <h2>TABLA DE POSICIONES</h2>

          <div id="table-skeleton">
            <div class="skeleton skeleton-row"></div>
            <div class="skeleton skeleton-row"></div>
          </div>

          <div class="standings-table-wrapper">
            <table class="standings-table">
              <thead>
                <tr>
                  <th>#</th><th>Club</th><th>PJ</th><th>PG</th><th>PP</th>
                  <th>PF</th><th>PC</th><th>DG</th><th>PTS</th>
                </tr>
              </thead>
              <tbody id="standingsBody"></tbody>
            </table>
          </div>
        </section>

      </div>
    </main>

    <footer class="site-footer">
      <p>© 2025 ABNECH Basket (MecInfoTec)</p>
    </footer>
  </div>

  <script type="module">
    import { initPublicPage } from "./js/public.js";

    const landing = document.getElementById("landing");
    const app = document.getElementById("app");

    if (localStorage.getItem("abnech_entered") === "true") {
      landing.classList.add("hidden");
      app.classList.remove("hidden");
      app.classList.add("show");
      initPublicPage();
    }

    document.getElementById("enterBtn").addEventListener("click", () => {
      localStorage.setItem("abnech_entered", "true");
      landing.classList.add("hidden");
      app.classList.remove("hidden");
      app.classList.add("show");
      initPublicPage();
    });
  </script>

</body>
</html>

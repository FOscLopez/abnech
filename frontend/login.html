<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Admin ABNECH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>

  <div class="login-box">
    <h2>Admin ABNECH</h2>

    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Contraseña" />

    <button id="loginBtn">Ingresar</button>
    <p id="errorMsg" style="color:red; display:none;">Credenciales inválidas</p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from
      "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC0ypWFEhPWu2jiyTZoW3fd9SPes3wcBdc",
      authDomain: "abnech-basket.firebaseapp.com",
      projectId: "abnech-basket",
      storageBucket: "abnech-basket.firebasestorage.app",
      messagingSenderId: "1020692623846",
      appId: "1:1020692623846:web:a1b37421b2e891b52b6627",
      measurementId: "G-S3KXDNB58S"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById("loginBtn").onclick = async () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const error = document.getElementById("errorMsg");

      try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = "/";
      } catch (e) {
        error.style.display = "block";
      }
    };
  </script>

</body>
</html>

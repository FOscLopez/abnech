<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Club - ABNECH</title>

  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<!-- HEADER CLUB -->
<section class="club-hero-pro">

  <img src="../img/clubs/palermo-cap.png" class="club-logo-pro">

  <h1>Club Palermo</h1>

  <p class="club-colors">
    Celeste
  </p>

</section>

<!-- CONTENIDO -->
<main class="club-container">

  <!-- PLANTEL -->
  <section class="club-card-pro">
    <h2>🏀 Plantel</h2>

    <table class="club-table-pro">
      <thead>
        <tr>
          <th>#</th>
          <th>Nombre</th>
          <th>DNI</th>
          <th>Fecha</th>
          <th>Categorías</th>
        </tr>
      </thead>

      <tbody>
        <tr>
          <td>1</td>
          <td>Amarilla, Antonio Ariel</td>
          <td>39.617.934</td>
          <td>13/06/1996</td>
          <td>Primera</td>
        </tr>
      </tbody>
    </table>
  </section>

  <!-- NOTICIAS -->
  <section class="club-card-pro">
    <h2>📰 Noticias</h2>

    <div class="news-pro">
      <div class="news-item-pro">
        <h3>Victoria ante Unión</h3>
        <span>02/02/2026</span>
        <p>Gran victoria como local.</p>
      </div>
    </div>

  </section>

  <!-- HISTORIA -->
  <section class="club-card-pro">
    <h2>📖 Historia</h2>

    <p>
      Club en crecimiento con fuerte desarrollo formativo.
    </p>

  </section>

</main>

<footer class="site-footer">
  © 2026 ABNECH
</footer>

</body>
</html>

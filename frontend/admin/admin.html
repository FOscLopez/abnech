<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>ABNECH Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./admin.css" />
</head>
<body>

  <h1>ABNECH – Panel Administrador</h1>

  <div id="statusMsg" style="margin:10px 0; color:#fbbf24;"></div>

  <!-- CREAR FIXTURE -->
  <h3>Crear nuevo partido</h3>

  <div class="controls">

    <input type="date" id="newDate" />
    <input type="time" id="newTime" />

    <input
      type="text"
      id="newHome"
      placeholder="Local (ej: union)"
    />

    <input
      type="text"
      id="newAway"
      placeholder="Visitante (ej: funebrero)"
    />

    <input
      type="text"
      id="newVenue"
      placeholder="Sede"
    />

    <button id="createBtn">Crear</button>
  </div>

  <hr />

  <!-- FILTRO -->
  <div class="controls">
    <label>
      Categoría:
      <select id="categorySelect">
        <option value="B1">B1</option>
      </select>
    </label>

    <button id="loadBtn">Cargar fixtures</button>
  </div>

  <!-- TABLA -->
  <table id="fixturesTable">
    <thead>
      <tr>
        <th>Fecha</th>
        <th>Local</th>
        <th>Visitante</th>
        <th>Local</th>
        <th>Visitante</th>
        <th>Estado</th>
        <th>Acción</th>
      </tr>
    </thead>

    <tbody></tbody>
  </table>

  <script type="module" src="./admin.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>ABNECH Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./admin.css" />
</head>
<body>

  <h1>ABNECH – Panel Administrador</h1>

  <div id="statusMsg" style="margin:10px 0; color:#fbbf24;"></div>

  <!-- ================= CREAR FIXTURE ================= -->
  <h3>Crear nuevo partido</h3>

  <div class="controls">

    <input id="newDate" type="date" />
    <input id="newTime" type="time" />

    <input id="newHome" placeholder="Local (ej: union)" />
    <input id="newAway" placeholder="Visitante (ej: funebrero)" />

    <input id="newVenue" placeholder="Sede" />

    <button id="createBtn">Crear</button>

  </div>

  <hr />

  <!-- ================= CARGAR FIXTURES ================= -->

  <div class="controls">
    <label>
      Categoría:
      <select id="categorySelect">
        <option value="B1">B1</option>
      </select>
    </label>

    <button id="loadBtn">Cargar fixtures</button>
  </div>

  <table id="fixturesTable">
    <thead>
      <tr>
        <th>Fecha</th>
        <th>Local</th>
        <th>Visitante</th>
        <th>Local</th>
        <th>Visitante</th>
        <th>Estado</th>
        <th>Acción</th>
      </tr>
    </thead>

    <tbody></tbody>
  </table>

  <script type="module" src="./admin.js"></script>

</body>
</html>
